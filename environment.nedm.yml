# pychrono 10 HMMWV/RL environment (`nedm`).
#
# Used for NN-dynamics RL training, Chrono-backed RL policy evaluation
# (scripts/eval_hmmwv_rl_chrono_tracking.py and related debug/overlay tools),
# and pychrono 10.0.0 from the official projectchrono channel.
#
#   conda env create -f environment.nedm.yml
name: nedm
channels:
  - projectchrono
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  - pip
  - pychrono=10.0.0
  - numpy=2.4.6
  - pip:
      - torch==2.12.0
      - rsl-rl-lib==2.2.4
      - matplotlib==3.10.9
      - tensorboard
